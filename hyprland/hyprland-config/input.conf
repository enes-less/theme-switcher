# ======================
# INPUT
# ======================
# Define your input choices.

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# Feel free to remove/edit this one. I use an MX Master 3, and sometimes a Magic Trackpad.
# So I added this personalized magic trackpad config.
device {
    name = apple-inc.-magic-trackpad
    sensitivity = 0.5
    accel_profile = flat
    natural_scroll = true
    scroll_factor = 0.2
}